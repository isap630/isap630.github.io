<html>
    <head>
        <title>Arlenis's Midterm</title>
        <link rel="stylesheet" href="style.css">
        <!-- Meta tag to make this a responsive web page -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <!-- Navbar-->
        <div class="nav-bar">
            <h3 class="links">
                <li class="nav-link"><a href="home.html">viewdio</a></li>
                <li class="nav-link"><a href="#movies">Movies</a></li>
				<li class="nav-link"><a href="#tv-shows">TV Shows</a></li>
                <li class="nav-link"><a href="#sports">Sports</a></li>
                <li class="nav-link"><a href="login.html">Login</a></li>
            </h3>
            <div class="search-container">
                <form>
                  <input type="text" placeholder="Search.." name="search">
                </form>
              </div>
            </div>
        </div> 

        <!-- Movie Browsing-->
        <div id="movies">
            <div class="browse-title"><h2>Movies</h2></div>
            <div class="big-browsing">

                    <a href="videos/placeholder.mp4"><img class="photo" src="horror/getout.jpeg" width="30%" alt="Get Out"/></a>

                    <a href="videos/placeholder.mp4"><img class="photo" src="horror/theshining.webp" width="30%" alt="The Shining" /></a>
                </div>
            </div>
        </div>

        <!--TV Browsing-->
        <div id="tv-shows">
            <div class="browse-title"><h2>TV Shows</h2></div>

            <div class="big-browsing">
                <div class="scroll">
                    <a href="videos/placeholder.mp4"><img class="photo" src="tv/breakingbad.jpeg" width="30%" alt="Breaking Bad"/></a>

                    <a href="videos/placeholder.mp4"><img class="photo" src="tv/bridgerton.jpeg" width="30%" alt="Bridgerton"/></a>
            </div>
        </div>


        <!-- Anime Browsing-->
        <div id="Anime">
        <div class="browse-title"><h2>Anime</h2></div>
        <div class="big-browsing">
            <div class="scroll">
                <a href="videos/placeholder.mp4"><img class="photo" src="anime_big-poster/aot.jpeg" width="30%" alt="Attack On Titan"/></a>
                <a href="videos/placeholder.mp4"><img class="photo" src="anime_big-poster/yurionice.jpeg" width="30%" alt="Yuri on Ice"/></a>

        <div class="small-browsing">
            <div class="scroll">
                <a href="videos/placeholder.mp4"><img class="photo" src="anime_small-poster/deathnote.jpeg" width="20%" alt="Deathnote"/></a>
                <a href="videos/placeholder.mp4"><img class="photo" src="anime_small-poster/hunterxhunter.jpeg" width="20%" alt="Hunter x Hunter"/></a>

            <div class="browse-title"><h2>Sports</h2></div>
            <div class="sports-scroll">
                <img src="sports/mbl.png" width="30%" alt="mbl"/>
                <img src="sports/nba.webp" width="30%" alt="nba"/>
                <img src="sports/nhl.png" width="20%" alt="nhl"/>
                <img src="sports/nfl.png" width="20%" alt="nfl"/>
