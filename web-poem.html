<!DOCTYPE HTML>

<html>
    <head>
        <title>Arlenis's Website</title>
        <link rel="stylesheet" href="style-poem.css">
        <!-- Meta tag to make this a responsive web page -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
    <div>

        <audio preload autoplay>
            <source src="end-of-the-world.mp3" type="audio/mpeg">
        </audio>

		<!-- Title-->
        
        <div class="web-title">
            <h1>intro (end of the world) - Ariana Grande</h1>
        </div>

		<!-- Web Poem-->
        <h2 class="text1" >if the sun refused to shine</h2>
        <br>
        <h2 class="text2">baby, would i still be your lover?</h2>
        <br>
        <h2 class="text3">would you want me there?</h2>
        <br>
        <h2 class="text4">if the moon went dark tonight,</h2>
        <br>
        <h2 class="text5">and if it all ended tomorrow</h2>
        <br>
        <h2 class="text6">would i be the one on your mind?</h2>
        <br>
        <h2 class="text7">and if it all ended tomorrow</h2>
        <br>
        <h2 class="text8">would you be the one on mine?</h2>
        
    </body>
</html>
